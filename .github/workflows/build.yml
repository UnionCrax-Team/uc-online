name: Build Steam Proxy DLLs

on:
  push:
    branches: [ "dllsteamapi" ]
  pull_request:
    branches: [ "dllsteamapi" ]

jobs:

# ======================================================
# MinGW-w64 build (static runtime)
# ======================================================

  mingw:

    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - arch: x86
            target: steam_api
            artifact_name: mingw_x86
          - arch: x64
            target: steam_api64
            artifact_name: mingw_x64

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MinGW
        shell: pwsh
        run: |
          if ('${{ matrix.arch }}' -eq 'x86') {
            choco install mingw --version=13.2.0 --params "/exception:sjlj /arch:i686" -y --no-progress
            echo "C:\ProgramData\mingw32\mingw32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            choco install mingw --version=13.2.0 -y --no-progress
            echo "C:\ProgramData\mingw64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Configure (MinGW)
        run: |
          cmake -S . -B build `
            -G "MinGW Makefiles" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target ${{ matrix.target }} --parallel

      - name: Verify dependencies
        shell: cmd
        run: |
          for %%f in (build\*.dll) do objdump -p "%%f" | findstr "DLL Name"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/*.dll


# ======================================================
# MSVC build (Visual Studio toolchain)
# ======================================================

  msvc:

    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - arch: Win32
            target: steam_api
            artifact_name: msvc_Win32
          - arch: x64
            target: steam_api64
            artifact_name: msvc_x64

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC Dev Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Configure (MSVC)
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A ${{ matrix.arch }}

      - name: Build
        run: |
          cmake --build build --config Release --target ${{ matrix.target }} --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/Release/*.dll
